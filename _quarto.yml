project:
  type: website
  output-dir: _output

website:
  title: "Exploration"
  description: "Some scientific exploration about geography, limnology, hydrology, oceanography, climatology and so on."
  site-url: https://froq.me/research-site/
  repo-url: https://github.com/0froq/research-site
  favicon: assets/favicon.svg
  open-graph: true
  twitter-card: true
  llms-txt: true
  repo-actions: [edit, source, issue]
  page-navigation: true
  back-to-top-navigation: true

  search:
    location: sidebar
    type: textbox

  navbar:
    title: "Exploration"
    search: false
    pinned: false
    left:
      - text: Explorations
        href: explorations/index.qmd
      - text: Metrics
        href: metrics/index.qmd
      - text: Notes
        href: notes/index.qmd
    right: []

  sidebar:
    - title: Explorations
      style: floating
      search: true
      contents:
        - section: Explorations
          href: explorations/index.qmd
          contents:
            - section: Warming Acceleration
              contents:
                - section: Draft
                  contents:
                    - auto: explorations/warming-acceleration/draft/*.qmd
                - section: Prose
                  contents:
                    - auto: explorations/warming-acceleration/prose/*.qmd
                - section: Log
                  contents:
                    - explorations/warming-acceleration/log/index.qmd
                    - auto: explorations/warming-acceleration/log/*.qmd
    - title: Metrics
      contents:
        - section: Metrics
          href: metrics/index.qmd
          contents:
            - auto: metrics/*.qmd
    - title: Notes
      contents:
        - text: All Notes
          href: notes/index.qmd
        - section: Papers
          contents:
            - auto: notes/papers/*.qmd
        - section: Points
          contents:
            - auto: notes/points/*.qmd
        - text: Paper Collection
          href: notes/paper-collection.qmd


  page-footer:
    border: true
    center:
      - text: "froq.me"
        href: https://froq.me
    right:
      - icon: github
        href: https://github.com/0froq/research-site
        aria-label: GitHub

format:
  html:
    theme:
      light: theme-light.scss
      dark: theme-dark.scss
    toc: true
    toc-depth: 3
    number-sections: false
    fig-cap-location: bottom
    tbl-cap-location: top
    code-fold: false
    code-tools: false
  # pdf:
  #   documentclass: article
  #   papersize: a4
  #   fontsize: 11pt
  #   geometry:
  #     - top=2.5cm
  #     - bottom=2.5cm
  #     - left=2.5cm
  #     - right=2.5cm
  #   include-in-header:
  #     text: |
  #       \usepackage{booktabs}
  #       \usepackage{float}
  #       \floatplacement{figure}{H}
  #   fig-cap-location: bottom
  #   tbl-cap-location: top
  #   number-sections: true

execute:
  freeze: auto
  echo: false
  warning: false
  message: false

bibliography: zotero.bib

crossref:
  fig-prefix: "Figure"
  tbl-prefix: "Table"
  eq-prefix: "Equation"
